{% extends "base.html" %}

{% block title %}Вход - Мой Блог{% endblock %}

{% block content %}
<section aria-labelledby="login-title" class="min-h-[60vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    
    <header class="sm:mx-auto sm:w-full sm:max-w-md">
        <h1 id="login-title" class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Войдите в аккаунт
        </h1>
        <nav aria-label="Альтернативные действия" class="mt-2 text-center text-sm text-gray-600">
            Или
            <a href="{% url 'blog:signup' %}" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                зарегистрируйтесь
            </a>
        </nav>
    </header>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow-sm border border-gray-200 sm:rounded-xl sm:px-10">
            
            <!-- Блок с ошибками с правильными ARIA-атрибутами -->
            {% if form.errors %}
                <div role="alert" aria-live="assertive" class="rounded-md bg-red-50 p-4 mb-6 border border-red-200">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg aria-hidden="true" class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <div class="ml-3">
                            <h2 class="text-sm font-medium text-red-800">
                                Имя пользователя или пароль введены неверно. Пожалуйста, попробуйте снова.
                            </h2>
                        </div>
                    </div>
                </div>
            {% endif %}

            <form class="space-y-6" method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <!-- Используем fieldset для логической группировки полей (хотя для двух полей div тоже подходит, здесь мы добавили aria-required) -->
                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700">
                        Имя пользователя
                    </label>
                    <div class="mt-1">
                        <input id="id_username" name="username" type="text" required aria-required="true" autocomplete="username" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all">
                    </div>
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700">
                        Пароль
                    </label>
                    <div class="mt-1">
                        <input id="id_password" name="password" type="password" required aria-required="true" autocomplete="current-password" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-all">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900 cursor-pointer">
                            Запомнить меня
                        </label>
                    </div>

                    <div class="text-sm">
                        <!-- Если у тебя еще нет password_reset, ссылка пока может вести на # или password_reset если он подключен -->
                        <a href="{% url 'password_reset' %}" class="font-medium text-blue-600 hover:text-blue-500 transition-colors">
                            Забыли пароль?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Войти
                    </button>
                </div>
                
                <input type="hidden" name="next" value="{{ next|default:'/' }}">
            </form>
        </div>
    </div>
</section>
{% endblock %}
