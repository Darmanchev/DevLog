{% extends "base.html" %}

{% block title %}Вход - BlogPortal{% endblock %}

{% block content %}
<section aria-labelledby="login-title" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 40px 0;">
    
    <header style="text-align: center; margin-bottom: 32px;">
        <h1 id="login-title" class="portal-feed-title" style="font-size: 32px; margin-bottom: 8px;">
            Войдите в аккаунт
        </h1>
        <p class="portal-feed-subtitle" style="font-size: 16px;">
            Или <a href="{% url 'blog:signup' %}" style="color: #6366f1; font-weight: 700; text-decoration: none;">зарегистрируйтесь</a>
        </p>
    </header>

    <div class="portal-card" style="width: 100%; max-width: 420px; padding: 32px;">
        {% if form.errors %}
            <div role="alert" aria-live="assertive" style="background: #fef2f2; border: 2px solid #fecaca; color: #ef4444; padding: 16px; border-radius: 12px; font-weight: 700; margin-bottom: 24px; font-size: 14px;">
                Имя пользователя или пароль введены неверно. Пожалуйста, попробуйте снова.
            </div>
        {% endif %}

        <form method="POST" action="{% url 'login' %}" style="display: flex; flex-direction: column; gap: 24px;">
            {% csrf_token %}

            <div>
                <label for="id_username" style="display:block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 14px;">
                    Имя пользователя
                </label>
                <input id="id_username" name="username" type="text" required aria-required="true" autocomplete="username" class="portal-input" style="width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
            </div>

            <div>
                <label for="id_password" style="display:block; margin-bottom: 8px; font-weight: 700; color: #475569; font-size: 14px;">
                    Пароль
                </label>
                <input id="id_password" name="password" type="password" required aria-required="true" autocomplete="current-password" class="portal-input" style="width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#e2e8f0'">
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--portal-ink); cursor: pointer; font-weight: 600;">
                    <input id="remember-me" name="remember-me" type="checkbox" style="width: 16px; height: 16px; accent-color: #6366f1; cursor: pointer;">
                    Запомнить меня
                </label>
                <a href="{% url 'password_reset' %}" style="font-size: 14px; color: #6366f1; font-weight: 600; text-decoration: none;">Забыли пароль?</a>
            </div>

            <button type="submit" class="portal-button" style="width: 100%; justify-content: center; padding: 14px; border-radius: 12px; margin-top: 8px;">
                <span class="portal-button-text">Войти</span>
            </button>
            
            <input type="hidden" name="next" value="{{ next|default:'/' }}">
        </form>
    </div>
</section>
{% endblock %}
