<div id="comment-form" class="portal-comment-form">
    <form
        method="POST"
        action="{% url 'blog:comment_create' post.slug %}"
        hx-post="{% url 'blog:comment_create' post.slug %}"
        hx-target="#comments-list"
        hx-swap="beforeend"
        hx-on::after-request="if (event.detail.successful) { this.reset(); document.getElementById('comments-empty')?.remove(); }"
    >
        {% csrf_token %}
        <div class="portal-field">
            <label for="id_body">Написать комментарий</label>
            <textarea
                id="id_body"
                name="body"
                required
                rows="4"
                class="portal-textarea"
                placeholder="Поделитесь своими мыслями..."
            >{{ comment_form.body.value|default_if_none:'' }}</textarea>

            {% if comment_form.body.errors %}
                <ul class="portal-field-errors">
                    {% for error in comment_form.body.errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        </div>

        <div class="portal-form-actions">
            <button type="submit" class="portal-button">
                Отправить
            </button>
        </div>
    </form>
</div>
