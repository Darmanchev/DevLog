<span id="comments-count" class="portal-chip portal-chip-soft" hx-swap-oob="true">{{ comments_count }}</span>

{% if comments_count == 0 %}
    <template hx-swap-oob="beforeend:#comments-list">
        <p id="comments-empty" class="portal-empty-state">Пока нет ни одного комментария. Будьте первым!</p>
    </template>
{% endif %}
