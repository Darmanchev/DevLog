{% if user.is_authenticated %}
    <button type="button"
            class="portal-like-btn {% if is_liked %}is-liked{% endif %}"
            hx-post="{% url 'blog:toggle_like' post.pk %}"
            hx-swap="outerHTML"
            aria-pressed="{% if is_liked %}true{% else %}false{% endif %}"
            title="{% if is_liked %}Убрать лайк{% else %}Поставить лайк{% endif %}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="{% if is_liked %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
        <span class="like-count">{{ likes_count }}</span>
    </button>
{% else %}
    <a href="{% url 'login' %}?next={{ request.path }}" class="portal-like-btn" title="Войдите, чтобы поставить лайк">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
        <span class="like-count">{{ likes_count }}</span>
    </a>
{% endif %}
