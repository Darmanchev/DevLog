<article id="comment-{{ comment.pk }}" class="portal-comment">
    <img src="https://api.dicebear.com/9.x/shapes/svg?seed={{comment.author.username}}" alt="{{comment.author.username}}" class="portal-avatar" loading="lazy">

    <div class="portal-comment-main">
        <header class="portal-comment-head">
            <div class="portal-comment-meta">
                <strong>{{ comment.author.username }}</strong>
                <time datetime="{{ comment.created_at|date:'c' }}">
                    {{ comment.created_at|date:"d.m.Y в H:i" }}
                </time>
                {% if comment.edited_at %}
                    <span>изменено</span>
                {% endif %}
            </div>

            {% if user == comment.author %}
                <div class="portal-comment-actions">
                    <button
                        type="button"
                        hx-get="{% url 'blog:comment_edit' comment.pk %}"
                        hx-target="#comment-{{ comment.pk }}"
                        hx-swap="outerHTML"
                        class="portal-text-button"
                    >
                        Редактировать
                    </button>
                    <form
                        method="POST"
                        action="{% url 'blog:comment_delete' comment.pk %}"
                        hx-post="{% url 'blog:comment_delete' comment.pk %}"
                        hx-target="#comment-{{ comment.pk }}"
                        hx-swap="delete"
                        hx-confirm="Удалить комментарий?"
                        class="m-0"
                    >
                        {% csrf_token %}
                        <button type="submit" class="portal-text-button portal-text-button-danger">
                            Удалить
                        </button>
                    </form>
                </div>
            {% endif %}
        </header>

        <div class="portal-comment-text">
            {{ comment.body|linebreaks }}
        </div>
    </div>
</article>
