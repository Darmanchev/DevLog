<article id="comment-{{ comment.pk }}" class="portal-comment">
    <img src="https://api.dicebear.com/9.x/shapes/svg?seed={{comment.author.username}}" alt="{{comment.author.username}}" class="portal-avatar" loading="lazy">

    <div class="portal-comment-main">
        <form
            method="POST"
            hx-post="{% url 'blog:comment_edit' comment.pk %}"
            hx-target="#comment-{{ comment.pk }}"
            hx-swap="outerHTML"
        >
            {% csrf_token %}

            <div class="portal-field">
                <label for="comment-body-{{ comment.pk }}">Редактировать комментарий</label>
                <textarea
                    id="comment-body-{{ comment.pk }}"
                    name="body"
                    required
                    rows="1"
                    data-autoresize
                    oninput="resizeTextarea(this)"
                    class="portal-textarea"
                >{{ form.body.value|default_if_none:'' }}</textarea>

                {% if form.body.errors %}
                    <ul class="portal-field-errors">
                        {% for error in form.body.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            </div>

            <div class="portal-form-actions">
                <button
                    type="button"
                    hx-get="{% url 'blog:comment_partial' comment.pk %}"
                    hx-target="#comment-{{ comment.pk }}"
                    hx-swap="outerHTML"
                    class="portal-button portal-button-soft"
                >
                    Отмена
                </button>
                <button
                    type="submit"
                    class="portal-button"
                >
                    Сохранить
                </button>
            </div>
        </form>
    </div>
</article>
