<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Блог</title>
</head>
<body>
    <h1>Посты</h1>

    {% for post in posts %}
        <article>
            <h2>{{ post.title }}</h2>
            <p>Автора: {{ post.author }} - {{ post.created_at|date:"d.m.Y" }}</p>
            <p>{{ post.body|truncatewords:30 }}</p>
        </article>
    {% empty %}
        <p>Постов пока нет.</p>
    {% endfor %}

</body>
</html>
