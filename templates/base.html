{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой Блог{% endblock %}</title>
    <!-- Подключаем скомпилированный файл Tailwind CSS -->
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col antialiased">

    <!-- Шапка сайта -->
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'blog:post_list' %}" class="text-2xl font-extrabold tracking-tight text-gray-900">
                My<span class="text-blue-600">Blog</span>
            </a>
            <nav>
                <a href="{% url 'blog:post_list' %}" class="text-gray-500 hover:text-blue-600 font-medium transition-colors">Главная</a>
            </nav>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="flex-grow w-full max-w-4xl mx-auto my-8 px-6">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Подвал сайта -->
    <footer class="bg-white border-t border-gray-200 text-center py-6 mt-auto">
        <p class="text-gray-500 text-sm">&copy; {% now "Y" %} Мой Блог. Все права защищены.</p>
    </footer>

</body>
</html>
