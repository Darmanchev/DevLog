{% extends "base.html" %}

{% block title %}Ошибка сервера - BlogPortal{% endblock %}

{% block content %}
<div class="portal-empty-card" style="margin-top: 10vh; max-width: 600px; margin-left: auto; margin-right: auto; padding: 100px 40px; border-color: #fecaca; background: #fef2f2;">
    <h1 style="font-size: 64px; font-weight: 900; color: #ef4444; line-height: 1; margin-bottom: 16px;">500</h1>
    <h2 style="font-size: 24px; font-weight: 800; color: #991b1b; margin-bottom: 16px;">Внутренняя ошибка сервера</h2>
    <p style="font-size: 16px; color: #b91c1c; margin-bottom: 32px; line-height: 1.6;">Что-то сломалось на нашей стороне. Мы уже работаем над тем, чтобы всё починить. Пожалуйста, зайдите чуть позже.</p>
    <a href="{% url 'blog:post_list' %}" class="portal-button" style="display: inline-flex; justify-content: center; padding: 14px 24px; border-radius: 12px;">Вернуться на главную</a>
</div>
{% endblock %}
